  <text x="450" y="70" text-anchor="middle" fill="#f9e2af" font-size="16" font-weight="bold">Before: capacity = 7, size = 5, load factor = 0.71</text>
  <text x="450" y="88" text-anchor="middle" fill="#a6adc8" font-size="12">(1 tombstone from removing Diana)</text>

  <!-- 7-slot old array -->
