  <text x="250" y="127" text-anchor="middle" fill="#1e1e2e" font-size="11" font-family="monospace">Bob, 82</text>
  <text x="250" y="143" text-anchor="middle" fill="#1e1e2e" font-size="9">OCCUPIED</text>
