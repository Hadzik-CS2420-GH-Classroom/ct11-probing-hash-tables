  <rect x="95" y="105" width="100" height="46" rx="5" fill="#6c7086" stroke="#585b70" stroke-width="1.5"/>
  <text x="145" y="133" text-anchor="middle" fill="#1e1e2e" font-size="11">[empty]</text>
  <text x="145" y="101" text-anchor="middle" fill="#a6adc8" font-size="10">0</text>

  <!-- Slot 1: Bob -->
