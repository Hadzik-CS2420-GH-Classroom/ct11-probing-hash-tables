  <text x="530" y="195" text-anchor="middle" fill="#89b4fa" font-size="14" font-weight="bold">resize()</text>
  <text x="530" y="212" text-anchor="middle" fill="#a6adc8" font-size="11">next_prime(7 * 2) = 17</text>

