<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="sans-serif">
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fab387"/>
    </marker>
  </defs>

  <rect width="900" height="380" rx="12" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#cdd6f4" font-size="20" font-weight="bold">Primary Clustering — Why Probing Slows Down</text>
  <text x="450" y="58" text-anchor="middle" fill="#a6adc8" font-size="14">Occupied runs grow and merge, making collisions more likely</text>

  <!-- Array of 11 slots -->
  <!-- Slot 0: empty -->
  <rect x="35" y="100" width="75" height="50" rx="5" fill="#6c7086" stroke="#585b70" stroke-width="1.5"/>
  <text x="72" y="130" text-anchor="middle" fill="#1e1e2e" font-size="12">[empty]</text>
  <text x="72" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">0</text>

  <!-- Slot 1: empty -->
  <rect x="115" y="100" width="75" height="50" rx="5" fill="#6c7086" stroke="#585b70" stroke-width="1.5"/>
  <text x="152" y="130" text-anchor="middle" fill="#1e1e2e" font-size="12">[empty]</text>
  <text x="152" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">1</text>

  <!-- Slot 2: empty -->
  <rect x="195" y="100" width="75" height="50" rx="5" fill="#6c7086" stroke="#585b70" stroke-width="1.5"/>
  <text x="232" y="130" text-anchor="middle" fill="#1e1e2e" font-size="12">[empty]</text>
  <text x="232" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">2</text>

  <!-- Slot 3: empty -->
  <rect x="275" y="100" width="75" height="50" rx="5" fill="#6c7086" stroke="#585b70" stroke-width="1.5"/>
  <text x="312" y="130" text-anchor="middle" fill="#1e1e2e" font-size="12">[empty]</text>
  <text x="312" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">3</text>

  <!-- CLUSTER START -->
  <!-- Slot 4: Alice (cluster start) -->
  <rect x="355" y="100" width="75" height="50" rx="5" fill="#a6e3a1" stroke="#f9e2af" stroke-width="2.5"/>
  <text x="392" y="122" text-anchor="middle" fill="#1e1e2e" font-size="11" font-family="monospace">Alice</text>
  <text x="392" y="140" text-anchor="middle" fill="#1e1e2e" font-size="10">95</text>
  <text x="392" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">4</text>

  <!-- Slot 5: Diana -->
  <rect x="435" y="100" width="75" height="50" rx="5" fill="#a6e3a1" stroke="#f9e2af" stroke-width="2.5"/>
  <text x="472" y="122" text-anchor="middle" fill="#1e1e2e" font-size="11" font-family="monospace">Diana</text>
  <text x="472" y="140" text-anchor="middle" fill="#1e1e2e" font-size="10">78</text>
  <text x="472" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">5</text>

  <!-- Slot 6: Eve -->
  <rect x="515" y="100" width="75" height="50" rx="5" fill="#a6e3a1" stroke="#f9e2af" stroke-width="2.5"/>
  <text x="552" y="122" text-anchor="middle" fill="#1e1e2e" font-size="11" font-family="monospace">Eve</text>
  <text x="552" y="140" text-anchor="middle" fill="#1e1e2e" font-size="10">88</text>
  <text x="552" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">6</text>

  <!-- Slot 7: Charlie -->
  <rect x="595" y="100" width="75" height="50" rx="5" fill="#a6e3a1" stroke="#f9e2af" stroke-width="2.5"/>
  <text x="632" y="122" text-anchor="middle" fill="#1e1e2e" font-size="11" font-family="monospace">Charlie</text>
  <text x="632" y="140" text-anchor="middle" fill="#1e1e2e" font-size="10">91</text>
  <text x="632" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">7</text>
  <!-- CLUSTER END -->

  <!-- Slot 8: empty (first open slot) -->
  <rect x="675" y="100" width="75" height="50" rx="5" fill="#6c7086" stroke="#a6e3a1" stroke-width="3"/>
  <text x="712" y="130" text-anchor="middle" fill="#1e1e2e" font-size="12">[empty]</text>
  <text x="712" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">8</text>

  <!-- Slot 9: empty -->
  <rect x="755" y="100" width="75" height="50" rx="5" fill="#6c7086" stroke="#585b70" stroke-width="1.5"/>
  <text x="792" y="130" text-anchor="middle" fill="#1e1e2e" font-size="12">[empty]</text>
  <text x="792" y="95" text-anchor="middle" fill="#a6adc8" font-size="11">9</text>

  <!-- Cluster bracket -->
  <line x1="355" y1="160" x2="355" y2="175" stroke="#f9e2af" stroke-width="2"/>
  <line x1="670" y1="160" x2="670" y2="175" stroke="#f9e2af" stroke-width="2"/>
  <line x1="355" y1="175" x2="670" y2="175" stroke="#f9e2af" stroke-width="2"/>
  <line x1="512" y1="175" x2="512" y2="185" stroke="#f9e2af" stroke-width="2"/>
  <text x="512" y="200" text-anchor="middle" fill="#f9e2af" font-size="13" font-weight="bold">Cluster: 4 consecutive occupied slots</text>

  <!-- New insert hashing to slot 4 -->
  <rect x="60" y="230" width="240" height="42" rx="8" fill="#313244" stroke="#f5c2e7" stroke-width="1.5"/>
  <text x="180" y="256" text-anchor="middle" fill="#f5c2e7" font-size="14" font-family="monospace">hash("Frank") = 4</text>

  <!-- Probe path: 4→5→6→7→8 -->
  <path d="M300,251 L392,251 L392,160" stroke="#fab387" stroke-width="2" fill="none" stroke-dasharray="6,3"/>
  <text x="392" y="250" text-anchor="middle" fill="#fab387" font-size="10" dy="-5">taken</text>
  <path d="M392,165 Q412,180 472,165" stroke="#fab387" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="472" y="250" text-anchor="middle" fill="#fab387" font-size="10" dy="-5">taken</text>
  <path d="M472,165 Q492,180 552,165" stroke="#fab387" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="552" y="250" text-anchor="middle" fill="#fab387" font-size="10" dy="-5">taken</text>
  <path d="M552,165 Q572,180 632,165" stroke="#fab387" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="632" y="250" text-anchor="middle" fill="#fab387" font-size="10" dy="-5">taken</text>
  <path d="M632,165 Q652,180 712,165" stroke="#fab387" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="712" y="167" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="bold" dy="-10">insert!</text>

  <!-- Count -->
  <text x="450" y="290" text-anchor="middle" fill="#fab387" font-size="14" font-weight="bold">4 probes to find an open slot!</text>

  <!-- Summary box -->
  <rect x="60" y="310" width="780" height="55" rx="8" fill="#313244" stroke="#585b70" stroke-width="1.5"/>
  <text x="450" y="333" text-anchor="middle" fill="#f9e2af" font-size="14" font-weight="bold">Primary Clustering: occupied runs grow and merge as the table fills</text>
  <text x="450" y="353" text-anchor="middle" fill="#a6adc8" font-size="13">Any new key hashing into a cluster must probe through the ENTIRE cluster. This is why probing resizes at 0.75.</text>
</svg>
