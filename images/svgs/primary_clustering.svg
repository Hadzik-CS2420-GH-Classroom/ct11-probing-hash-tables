<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 298" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">Primary Clustering — Why Probing Slows Down</text>
  <text x="450" y="50" text-anchor="middle" fill="#555" font-size="13">Occupied runs grow and merge, making probe sequences longer</text>

  <!-- Cluster bracket ABOVE index numbers (slots 4–7, x=355–670) -->
  <text x="512" y="66" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="bold">cluster: 4 consecutive occupied slots</text>
  <line x1="355" y1="70" x2="355" y2="78" stroke="#f39c12" stroke-width="2"/>
  <line x1="670" y1="70" x2="670" y2="78" stroke="#f39c12" stroke-width="2"/>
  <line x1="355" y1="70" x2="670" y2="70" stroke="#f39c12" stroke-width="2"/>

  <!-- Index numbers -->
  <text x="72"  y="91" text-anchor="middle" fill="#aaa" font-size="11">0</text>
  <text x="152" y="91" text-anchor="middle" fill="#aaa" font-size="11">1</text>
  <text x="232" y="91" text-anchor="middle" fill="#aaa" font-size="11">2</text>
  <text x="312" y="91" text-anchor="middle" fill="#aaa" font-size="11">3</text>
  <text x="392" y="91" text-anchor="middle" fill="#f39c12" font-size="11">4</text>
  <text x="472" y="91" text-anchor="middle" fill="#f39c12" font-size="11">5</text>
  <text x="552" y="91" text-anchor="middle" fill="#f39c12" font-size="11">6</text>
  <text x="632" y="91" text-anchor="middle" fill="#f39c12" font-size="11">7</text>
  <text x="712" y="91" text-anchor="middle" fill="#aaa" font-size="11">8</text>
  <text x="792" y="91" text-anchor="middle" fill="#aaa" font-size="11">9</text>

  <!-- ===== Slots y=97, h=38, bottom=135 ===== -->
  <rect x="35"  y="97" width="75" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="72"  y="121" text-anchor="middle" fill="#bbb" font-size="12" font-style="italic">[empty]</text>
  <rect x="115" y="97" width="75" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="152" y="121" text-anchor="middle" fill="#bbb" font-size="12" font-style="italic">[empty]</text>
  <rect x="195" y="97" width="75" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="232" y="121" text-anchor="middle" fill="#bbb" font-size="12" font-style="italic">[empty]</text>
  <rect x="275" y="97" width="75" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="312" y="121" text-anchor="middle" fill="#bbb" font-size="12" font-style="italic">[empty]</text>

  <rect x="355" y="97" width="75" height="38" rx="5" fill="#2ecc71" stroke="#f39c12" stroke-width="2.5"/>
  <text x="392" y="113" text-anchor="middle" fill="#fff" font-size="12" font-family="'Consolas',monospace">Alice</text>
  <text x="392" y="127" text-anchor="middle" fill="#d5f5e3" font-size="10">95</text>
  <rect x="435" y="97" width="75" height="38" rx="5" fill="#2ecc71" stroke="#f39c12" stroke-width="2.5"/>
  <text x="472" y="113" text-anchor="middle" fill="#fff" font-size="12" font-family="'Consolas',monospace">Diana</text>
  <text x="472" y="127" text-anchor="middle" fill="#d5f5e3" font-size="10">78</text>
  <rect x="515" y="97" width="75" height="38" rx="5" fill="#2ecc71" stroke="#f39c12" stroke-width="2.5"/>
  <text x="552" y="113" text-anchor="middle" fill="#fff" font-size="12" font-family="'Consolas',monospace">Eve</text>
  <text x="552" y="127" text-anchor="middle" fill="#d5f5e3" font-size="10">88</text>
  <rect x="595" y="97" width="75" height="38" rx="5" fill="#2ecc71" stroke="#f39c12" stroke-width="2.5"/>
  <text x="632" y="113" text-anchor="middle" fill="#fff" font-size="12" font-family="'Consolas',monospace">Charlie</text>
  <text x="632" y="127" text-anchor="middle" fill="#d5f5e3" font-size="10">91</text>

  <!-- Slot 8: first open -->
  <rect x="675" y="97" width="75" height="38" rx="5" fill="#ecf0f1" stroke="#27ae60" stroke-width="2.5"/>
  <text x="712" y="121" text-anchor="middle" fill="#bbb" font-size="12" font-style="italic">[empty]</text>
  <!-- Slot 9 -->
  <rect x="755" y="97" width="75" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="792" y="121" text-anchor="middle" fill="#bbb" font-size="12" font-style="italic">[empty]</text>

  <!-- ===== Probe annotations below array (slot bottom=135) ===== -->
  <text x="50" y="151" text-anchor="start" fill="#8e44ad" font-size="12" font-style="italic">New key: hash("Frank") = 4</text>
  <text x="50" y="164" text-anchor="start" fill="#8e44ad" font-size="12" font-style="italic">probe forward until an open slot is found</text>

  <!-- Annotation columns -->
  <text x="392" y="150" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">taken</text>
  <line x1="419" y1="153" x2="444" y2="153" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <text x="472" y="150" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">taken</text>
  <line x1="499" y1="153" x2="524" y2="153" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <text x="552" y="150" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">taken</text>
  <line x1="579" y1="153" x2="604" y2="153" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <text x="632" y="150" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">taken</text>
  <line x1="659" y1="153" x2="684" y2="153" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <text x="730" y="150" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">EMPTY ✓</text>
  <text x="730" y="163" text-anchor="middle" fill="#27ae60" font-size="10">Frank inserted</text>

  <!-- Counter -->
  <text x="512" y="214" text-anchor="middle" fill="#e67e22" font-size="13" font-weight="bold">4 probes to find an open slot — entire cluster scanned</text>

  <!-- Summary box -->
  <rect x="30" y="226" width="840" height="62" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="246" text-anchor="middle" fill="#f39c12" font-size="13" font-weight="bold">Primary Clustering: any key hashing into a cluster must probe through the ENTIRE cluster</text>
  <text x="450" y="263" text-anchor="middle" fill="#555" font-size="12">Clusters grow as more keys insert at their tails — runs merge, probe lengths spike.</text>
  <text x="450" y="279" text-anchor="middle" fill="#555" font-size="12">This is why the table resizes at 0.75 load factor, before clusters get long.</text>
</svg>
