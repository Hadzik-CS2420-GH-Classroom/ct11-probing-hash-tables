<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 570" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">Linear Probing — Search</text>
  <text x="450" y="52" text-anchor="middle" fill="#555" font-size="13">Three outcomes: key found, found after skipping a tombstone, or not found</text>

  <!-- ================================================================ -->
  <!-- SCENARIO 1: search("Eve") — FOUND                                -->
  <!-- ================================================================ -->
  <text x="450" y="72" text-anchor="middle" fill="#27ae60" font-size="15" font-weight="bold">Scenario 1: search("Eve") — FOUND</text>
  <text x="450" y="87" text-anchor="middle" fill="#555" font-size="12">hash("Eve") = 4 — probe forward until key matches or EMPTY is hit</text>

  <!-- Index labels -->
  <text x="90"  y="101" text-anchor="middle" fill="#aaa" font-size="11">0</text>
  <text x="210" y="101" text-anchor="middle" fill="#aaa" font-size="11">1</text>
  <text x="330" y="101" text-anchor="middle" fill="#aaa" font-size="11">2</text>
  <text x="450" y="101" text-anchor="middle" fill="#aaa" font-size="11">3</text>
  <text x="570" y="101" text-anchor="middle" fill="#aaa" font-size="11">4</text>
  <text x="690" y="101" text-anchor="middle" fill="#aaa" font-size="11">5</text>
  <text x="810" y="101" text-anchor="middle" fill="#aaa" font-size="11">6</text>

  <!-- Slot 0: empty -->
  <rect x="30"  y="107" width="120" height="46" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="90"  y="135" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>
  <!-- Slot 1: Bob -->
  <rect x="150" y="107" width="120" height="46" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="127" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Bob</text>
  <text x="210" y="143" text-anchor="middle" fill="#d5f5e3" font-size="11">82</text>
  <!-- Slot 2: empty -->
  <rect x="270" y="107" width="120" height="46" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="330" y="135" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>
  <!-- Slot 3: Charlie -->
  <rect x="390" y="107" width="120" height="46" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="127" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Charlie</text>
  <text x="450" y="143" text-anchor="middle" fill="#d5f5e3" font-size="11">91</text>
  <!-- Slot 4: Alice — probed, no match (orange border) -->
  <rect x="510" y="107" width="120" height="46" rx="5" fill="#2ecc71" stroke="#f39c12" stroke-width="2.5"/>
  <text x="570" y="127" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Alice</text>
  <text x="570" y="143" text-anchor="middle" fill="#d5f5e3" font-size="11">95</text>
  <!-- Slot 5: Eve — FOUND (thick green border) -->
  <rect x="630" y="107" width="120" height="46" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="3"/>
  <text x="690" y="127" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Eve</text>
  <text x="690" y="143" text-anchor="middle" fill="#d5f5e3" font-size="11">88</text>
  <!-- Slot 6: Diana -->
  <rect x="750" y="107" width="120" height="46" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="810" y="127" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Diana</text>
  <text x="810" y="143" text-anchor="middle" fill="#d5f5e3" font-size="11">78</text>

  <!-- Annotations: slot 4 no match, arrow, slot 5 found -->
  <text x="570" y="161" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="bold">Alice ≠ Eve</text>
  <!-- Arrow 4 → 5 (horizontal, between columns) -->
  <line x1="617" y1="163" x2="644" y2="163" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="630" y="176" text-anchor="middle" fill="#f39c12" font-size="10">probe +1</text>
  <text x="690" y="161" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Eve == Eve ✓</text>
  <text x="690" y="176" text-anchor="middle" fill="#27ae60" font-size="10">return &amp;88</text>

  <!-- ================================================================ -->
  <!-- SCENARIO 2: search("Diana") — FOUND past tombstone               -->
  <!-- ================================================================ -->
  <text x="450" y="206" text-anchor="middle" fill="#8e44ad" font-size="15" font-weight="bold">Scenario 2: search("Diana") — FOUND past tombstone</text>
  <text x="450" y="221" text-anchor="middle" fill="#555" font-size="12">hash("Diana") = 4 — Eve was deleted (slot 5 is now DELETED) — keep probing past it</text>

  <!-- Index labels -->
  <text x="90"  y="235" text-anchor="middle" fill="#aaa" font-size="11">0</text>
  <text x="210" y="235" text-anchor="middle" fill="#aaa" font-size="11">1</text>
  <text x="330" y="235" text-anchor="middle" fill="#aaa" font-size="11">2</text>
  <text x="450" y="235" text-anchor="middle" fill="#aaa" font-size="11">3</text>
  <text x="570" y="235" text-anchor="middle" fill="#aaa" font-size="11">4</text>
  <text x="690" y="235" text-anchor="middle" fill="#aaa" font-size="11">5</text>
  <text x="810" y="235" text-anchor="middle" fill="#aaa" font-size="11">6</text>

  <!-- Slot 0: empty -->
  <rect x="30"  y="241" width="120" height="46" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="90"  y="269" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>
  <!-- Slot 1: Bob -->
  <rect x="150" y="241" width="120" height="46" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="261" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Bob</text>
  <text x="210" y="277" text-anchor="middle" fill="#d5f5e3" font-size="11">82</text>
  <!-- Slot 2: empty -->
  <rect x="270" y="241" width="120" height="46" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="330" y="269" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>
  <!-- Slot 3: Charlie -->
  <rect x="390" y="241" width="120" height="46" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="261" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Charlie</text>
  <text x="450" y="277" text-anchor="middle" fill="#d5f5e3" font-size="11">91</text>
  <!-- Slot 4: Alice — probed, no match -->
  <rect x="510" y="241" width="120" height="46" rx="5" fill="#2ecc71" stroke="#f39c12" stroke-width="2.5"/>
  <text x="570" y="261" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Alice</text>
  <text x="570" y="277" text-anchor="middle" fill="#d5f5e3" font-size="11">95</text>
  <!-- Slot 5: DELETED tombstone -->
  <rect x="630" y="241" width="120" height="46" rx="5" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="690" y="260" text-anchor="middle" fill="#fff" font-size="13" font-style="italic">[deleted]</text>
  <text x="690" y="276" text-anchor="middle" fill="#fdebd0" font-size="10">DELETED</text>
  <!-- Slot 6: Diana — FOUND -->
  <rect x="750" y="241" width="120" height="46" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="3"/>
  <text x="810" y="261" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Diana</text>
  <text x="810" y="277" text-anchor="middle" fill="#d5f5e3" font-size="11">78</text>

  <!-- Annotations: slot 4, 5, 6 — horizontal arrows between columns -->
  <text x="570" y="295" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="bold">Alice ≠ Diana</text>
  <!-- Arrow 4 → 5 -->
  <line x1="617" y1="297" x2="644" y2="297" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="630" y="310" text-anchor="middle" fill="#f39c12" font-size="10">probe +1</text>

  <text x="690" y="295" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">DELETED — skip</text>
  <!-- Arrow 5 → 6 -->
  <line x1="737" y1="297" x2="764" y2="297" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="750" y="310" text-anchor="middle" fill="#f39c12" font-size="10">probe +1</text>

  <text x="810" y="295" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Diana == Diana ✓</text>
  <text x="810" y="310" text-anchor="middle" fill="#27ae60" font-size="10">return &amp;78</text>

  <!-- ================================================================ -->
  <!-- SCENARIO 3: search("Frank") — NOT FOUND                          -->
  <!-- ================================================================ -->
  <text x="450" y="344" text-anchor="middle" fill="#e74c3c" font-size="15" font-weight="bold">Scenario 3: search("Frank") — NOT FOUND</text>
  <text x="450" y="359" text-anchor="middle" fill="#555" font-size="12">hash("Frank") = 2 — slot 2 is EMPTY — Frank was never inserted past this point</text>

  <!-- Index labels -->
  <text x="90"  y="373" text-anchor="middle" fill="#aaa" font-size="11">0</text>
  <text x="210" y="373" text-anchor="middle" fill="#aaa" font-size="11">1</text>
  <text x="330" y="373" text-anchor="middle" fill="#aaa" font-size="11">2</text>
  <text x="450" y="373" text-anchor="middle" fill="#aaa" font-size="11">3</text>
  <text x="570" y="373" text-anchor="middle" fill="#aaa" font-size="11">4</text>
  <text x="690" y="373" text-anchor="middle" fill="#aaa" font-size="11">5</text>
  <text x="810" y="373" text-anchor="middle" fill="#aaa" font-size="11">6</text>

  <!-- Slot 0: empty -->
  <rect x="30"  y="379" width="120" height="46" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="90"  y="407" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>
  <!-- Slot 1: Bob -->
  <rect x="150" y="379" width="120" height="46" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="399" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Bob</text>
  <text x="210" y="415" text-anchor="middle" fill="#d5f5e3" font-size="11">82</text>
  <!-- Slot 2: EMPTY — search stops here (red border) -->
  <rect x="270" y="379" width="120" height="46" rx="5" fill="#ecf0f1" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="330" y="407" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>
  <!-- Slot 3: Charlie (faded, unreachable) -->
  <rect x="390" y="379" width="120" height="46" rx="5" fill="#d5dbdb" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="399" text-anchor="middle" fill="#aaa" font-size="13" font-family="'Consolas',monospace">Charlie</text>
  <text x="450" y="415" text-anchor="middle" fill="#bbb" font-size="11">91</text>
  <!-- Slots 4-6: faded -->
  <rect x="510" y="379" width="120" height="46" rx="5" fill="#d5dbdb" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="570" y="399" text-anchor="middle" fill="#aaa" font-size="13" font-family="'Consolas',monospace">Alice</text>
  <text x="570" y="415" text-anchor="middle" fill="#bbb" font-size="11">95</text>
  <rect x="630" y="379" width="120" height="46" rx="5" fill="#d5dbdb" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="690" y="399" text-anchor="middle" fill="#aaa" font-size="13" font-style="italic">[deleted]</text>
  <rect x="750" y="379" width="120" height="46" rx="5" fill="#d5dbdb" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="810" y="399" text-anchor="middle" fill="#aaa" font-size="13" font-family="'Consolas',monospace">Diana</text>
  <text x="810" y="415" text-anchor="middle" fill="#bbb" font-size="11">78</text>

  <!-- Annotation: EMPTY stops search -->
  <text x="330" y="436" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">EMPTY — stop</text>
  <text x="330" y="450" text-anchor="middle" fill="#e74c3c" font-size="11">Frank was never inserted past here</text>
  <text x="330" y="464" text-anchor="middle" fill="#e74c3c" font-size="11">return nullptr</text>
  <!-- "unreachable" label over faded slots -->
  <text x="645" y="435" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">never reached</text>

  <!-- ================================================================ -->
  <!-- Summary box                                                        -->
  <!-- ================================================================ -->
  <rect x="30" y="480" width="840" height="72" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="500" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="bold">Search Rules (in probe order):</text>
  <text x="450" y="517" text-anchor="middle" fill="#f39c12" font-size="12">OCCUPIED (different key)  →  probe +1 forward</text>
  <text x="450" y="533" text-anchor="middle" fill="#e67e22" font-size="12">DELETED (tombstone)  →  probe +1 forward  — key may still be further along</text>
  <text x="450" y="549" text-anchor="middle" fill="#e74c3c" font-size="12">EMPTY  →  stop, return nullptr  — key was never inserted past this slot</text>
</svg>
