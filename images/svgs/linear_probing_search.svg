<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 530" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">Linear Probing — Search</text>
  <text x="450" y="52" text-anchor="middle" fill="#555" font-size="13">Three outcomes: key found, found after skipping a tombstone, or not found</text>

  <!-- ================================================================ -->
  <!-- SCENARIO 1: search("Eve") — FOUND                                -->
  <!-- Slots y=107, h=38, bottom=145                                    -->
  <!-- ================================================================ -->
  <text x="450" y="72" text-anchor="middle" fill="#27ae60" font-size="15" font-weight="bold">Scenario 1: search("Eve") — FOUND</text>
  <text x="450" y="87" text-anchor="middle" fill="#555" font-size="12">hash("Eve") = 4 — probe forward until key matches or EMPTY is hit</text>

  <text x="90"  y="101" text-anchor="middle" fill="#aaa" font-size="11">0</text>
  <text x="210" y="101" text-anchor="middle" fill="#aaa" font-size="11">1</text>
  <text x="330" y="101" text-anchor="middle" fill="#aaa" font-size="11">2</text>
  <text x="450" y="101" text-anchor="middle" fill="#aaa" font-size="11">3</text>
  <text x="570" y="101" text-anchor="middle" fill="#aaa" font-size="11">4</text>
  <text x="690" y="101" text-anchor="middle" fill="#aaa" font-size="11">5</text>
  <text x="810" y="101" text-anchor="middle" fill="#aaa" font-size="11">6</text>

  <rect x="30"  y="107" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="90"  y="131" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <rect x="150" y="107" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="123" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Bob</text>
  <text x="210" y="137" text-anchor="middle" fill="#d5f5e3" font-size="11">82</text>

  <rect x="270" y="107" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="330" y="131" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <rect x="390" y="107" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="123" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Charlie</text>
  <text x="450" y="137" text-anchor="middle" fill="#d5f5e3" font-size="11">91</text>

  <!-- Slot 4: Alice — probed, no match -->
  <rect x="510" y="107" width="120" height="38" rx="5" fill="#2ecc71" stroke="#f39c12" stroke-width="2.5"/>
  <text x="570" y="123" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Alice</text>
  <text x="570" y="137" text-anchor="middle" fill="#d5f5e3" font-size="11">95</text>

  <!-- Slot 5: Eve — FOUND -->
  <rect x="630" y="107" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="3"/>
  <text x="690" y="123" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Eve</text>
  <text x="690" y="137" text-anchor="middle" fill="#d5f5e3" font-size="11">88</text>

  <rect x="750" y="107" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="810" y="123" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Diana</text>
  <text x="810" y="137" text-anchor="middle" fill="#d5f5e3" font-size="11">78</text>

  <!-- Annotations below S1 (slot bottom = 145, text baseline ≥ 160) -->
  <text x="570" y="162" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="bold">Alice ≠ Eve</text>
  <line x1="617" y1="165" x2="644" y2="165" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="630" y="178" text-anchor="middle" fill="#f39c12" font-size="10">probe +1</text>
  <text x="690" y="162" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Eve == Eve ✓</text>
  <text x="690" y="178" text-anchor="middle" fill="#27ae60" font-size="10">return &amp;88</text>

  <!-- ================================================================ -->
  <!-- SCENARIO 2: search("Diana") — FOUND past tombstone               -->
  <!-- Slots y=228, h=38, bottom=266                                    -->
  <!-- ================================================================ -->
  <text x="450" y="202" text-anchor="middle" fill="#8e44ad" font-size="15" font-weight="bold">Scenario 2: search("Diana") — FOUND past tombstone</text>
  <text x="450" y="217" text-anchor="middle" fill="#555" font-size="12">hash("Diana") = 4 — Eve was deleted (slot 5 is now DELETED) — keep probing past it</text>

  <text x="90"  y="231" text-anchor="middle" fill="#aaa" font-size="11">0</text>
  <text x="210" y="231" text-anchor="middle" fill="#aaa" font-size="11">1</text>
  <text x="330" y="231" text-anchor="middle" fill="#aaa" font-size="11">2</text>
  <text x="450" y="231" text-anchor="middle" fill="#aaa" font-size="11">3</text>
  <text x="570" y="231" text-anchor="middle" fill="#aaa" font-size="11">4</text>
  <text x="690" y="231" text-anchor="middle" fill="#aaa" font-size="11">5</text>
  <text x="810" y="231" text-anchor="middle" fill="#aaa" font-size="11">6</text>

  <rect x="30"  y="237" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="90"  y="261" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <rect x="150" y="237" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="253" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Bob</text>
  <text x="210" y="267" text-anchor="middle" fill="#d5f5e3" font-size="11">82</text>

  <rect x="270" y="237" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="330" y="261" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <rect x="390" y="237" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="253" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Charlie</text>
  <text x="450" y="267" text-anchor="middle" fill="#d5f5e3" font-size="11">91</text>

  <!-- Slot 4: Alice — probed, no match -->
  <rect x="510" y="237" width="120" height="38" rx="5" fill="#2ecc71" stroke="#f39c12" stroke-width="2.5"/>
  <text x="570" y="253" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Alice</text>
  <text x="570" y="267" text-anchor="middle" fill="#d5f5e3" font-size="11">95</text>

  <!-- Slot 5: DELETED tombstone -->
  <rect x="630" y="237" width="120" height="38" rx="5" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="690" y="253" text-anchor="middle" fill="#fff" font-size="12" font-style="italic">[deleted]</text>
  <text x="690" y="267" text-anchor="middle" fill="#fdebd0" font-size="10">DELETED</text>

  <!-- Slot 6: Diana — FOUND -->
  <rect x="750" y="237" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="3"/>
  <text x="810" y="253" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Diana</text>
  <text x="810" y="267" text-anchor="middle" fill="#d5f5e3" font-size="11">78</text>

  <!-- Annotations below S2 (slot bottom = 275, text baseline ≥ 290) -->
  <text x="570" y="292" text-anchor="middle" fill="#f39c12" font-size="12" font-weight="bold">Alice ≠ Diana</text>
  <line x1="617" y1="295" x2="644" y2="295" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="630" y="308" text-anchor="middle" fill="#f39c12" font-size="10">probe +1</text>

  <text x="690" y="292" text-anchor="middle" fill="#e67e22" font-size="12" font-weight="bold">DELETED — skip</text>
  <line x1="737" y1="295" x2="764" y2="295" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="750" y="308" text-anchor="middle" fill="#f39c12" font-size="10">probe +1</text>

  <text x="810" y="292" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">Diana == Diana ✓</text>
  <text x="810" y="308" text-anchor="middle" fill="#27ae60" font-size="10">return &amp;78</text>

  <!-- ================================================================ -->
  <!-- SCENARIO 3: search("Frank") — NOT FOUND                          -->
  <!-- Slots y=337, h=38, bottom=375                                    -->
  <!-- ================================================================ -->
  <text x="450" y="332" text-anchor="middle" fill="#e74c3c" font-size="15" font-weight="bold">Scenario 3: search("Frank") — NOT FOUND</text>
  <text x="450" y="347" text-anchor="middle" fill="#555" font-size="12">hash("Frank") = 2 — slot 2 is EMPTY — Frank was never inserted past this point</text>

  <text x="90"  y="361" text-anchor="middle" fill="#aaa" font-size="11">0</text>
  <text x="210" y="361" text-anchor="middle" fill="#aaa" font-size="11">1</text>
  <text x="330" y="361" text-anchor="middle" fill="#aaa" font-size="11">2</text>
  <text x="450" y="361" text-anchor="middle" fill="#aaa" font-size="11">3</text>
  <text x="570" y="361" text-anchor="middle" fill="#aaa" font-size="11">4</text>
  <text x="690" y="361" text-anchor="middle" fill="#aaa" font-size="11">5</text>
  <text x="810" y="361" text-anchor="middle" fill="#aaa" font-size="11">6</text>

  <rect x="30"  y="367" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="90"  y="391" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <rect x="150" y="367" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="383" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Bob</text>
  <text x="210" y="397" text-anchor="middle" fill="#d5f5e3" font-size="11">82</text>

  <!-- Slot 2: EMPTY — search stops (red border) -->
  <rect x="270" y="367" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="330" y="391" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <!-- Slots 3–6: faded (never reached) -->
  <rect x="390" y="367" width="120" height="38" rx="5" fill="#d5dbdb" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="383" text-anchor="middle" fill="#aaa" font-size="13" font-family="'Consolas',monospace">Charlie</text>
  <text x="450" y="397" text-anchor="middle" fill="#bbb" font-size="11">91</text>

  <rect x="510" y="367" width="120" height="38" rx="5" fill="#d5dbdb" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="570" y="383" text-anchor="middle" fill="#aaa" font-size="13" font-family="'Consolas',monospace">Alice</text>
  <text x="570" y="397" text-anchor="middle" fill="#bbb" font-size="11">95</text>

  <rect x="630" y="367" width="120" height="38" rx="5" fill="#d5dbdb" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="690" y="388" text-anchor="middle" fill="#aaa" font-size="13" font-style="italic">[deleted]</text>

  <rect x="750" y="367" width="120" height="38" rx="5" fill="#d5dbdb" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="810" y="383" text-anchor="middle" fill="#aaa" font-size="13" font-family="'Consolas',monospace">Diana</text>
  <text x="810" y="397" text-anchor="middle" fill="#bbb" font-size="11">78</text>

  <!-- Annotations below S3 (slot bottom = 405, text baseline ≥ 420) -->
  <text x="330" y="420" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">EMPTY — stop</text>
  <text x="330" y="434" text-anchor="middle" fill="#e74c3c" font-size="11">Frank was never inserted past here</text>
  <text x="330" y="448" text-anchor="middle" fill="#e74c3c" font-size="11">return nullptr</text>
  <text x="645" y="424" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">never reached</text>

  <!-- ================================================================ -->
  <!-- Summary box                                                        -->
  <!-- ================================================================ -->
  <rect x="30" y="463" width="840" height="55" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="481" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">Search Rules (in probe order):</text>
  <text x="450" y="496" text-anchor="middle" fill="#f39c12" font-size="12">OCCUPIED (different key) → probe +1   |   DELETED (tombstone) → probe +1 — key may still be ahead</text>
  <text x="450" y="511" text-anchor="middle" fill="#e74c3c" font-size="12">EMPTY → stop, return nullptr — key was never inserted past this slot</text>
</svg>
