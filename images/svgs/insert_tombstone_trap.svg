<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>

  <!-- Title -->
  <text x="460" y="30" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Insert + Tombstone Trap: Duplicate Key Bug</text>
  <text x="460" y="50" text-anchor="middle" fill="#555" font-size="13">What happens when insert stops at a tombstone without checking for an existing duplicate further along?</text>

  <!-- Setup label -->
  <text x="30" y="78" fill="#333" font-size="14" font-weight="bold">Setup: Bob at slot 2, Eve at slot 3 (collision). Then remove Bob.</text>

  <!-- Step 1: initial state -->
  <text x="30" y="108" fill="#888" font-size="12" font-weight="bold">After remove("Bob"):</text>
  <text x="80" y="130" fill="#aaa" font-size="10">0</text>
  <text x="160" y="130" fill="#aaa" font-size="10">1</text>
  <text x="240" y="130" fill="#f39c12" font-size="10">2</text>
  <text x="320" y="130" fill="#aaa" font-size="10">3</text>
  <text x="400" y="130" fill="#aaa" font-size="10">4</text>
  <text x="480" y="130" fill="#aaa" font-size="10">5</text>
  <text x="560" y="130" fill="#aaa" font-size="10">6</text>

  <rect x="55"  y="136" width="90" height="34" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="100" y="158" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">[empty]</text>
  <rect x="155" y="136" width="90" height="34" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="200" y="158" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">[empty]</text>
  <rect x="255" y="136" width="90" height="34" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="300" y="158" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">[deleted]</text>
  <rect x="355" y="136" width="90" height="34" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="400" y="152" text-anchor="middle" fill="#fff" font-size="11">Eve</text>
  <text x="400" y="164" text-anchor="middle" fill="#d5f5e3" font-size="9">88</text>
  <rect x="455" y="136" width="90" height="34" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="500" y="158" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">[empty]</text>
  <rect x="555" y="136" width="90" height="34" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="600" y="158" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">[empty]</text>
  <rect x="655" y="136" width="90" height="34" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="700" y="158" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">[empty]</text>

  <text x="760" y="152" fill="#555" font-size="11">hash("Eve") = 2</text>
  <text x="760" y="166" fill="#555" font-size="11">Eve probed to 3</text>

  <!-- ===== WRONG PATH ===== -->
  <rect x="20" y="190" width="880" height="150" rx="8" fill="#fce4ec" stroke="#e74c3c" stroke-width="2"/>
  <text x="460" y="212" text-anchor="middle" fill="#c62828" font-size="14" font-weight="bold">BUG: insert("Eve", 99) stops at first DELETED slot</text>

  <text x="40" y="238" fill="#c62828" font-size="12">hash("Eve") = 2 &#x2192; slot 2 is DELETED &#x2192; place Eve here!</text>

  <text x="80" y="266" fill="#aaa" font-size="10">0</text>
  <text x="160" y="266" fill="#aaa" font-size="10">1</text>
  <text x="240" y="266" fill="#e74c3c" font-size="10" font-weight="bold">2</text>
  <text x="320" y="266" fill="#aaa" font-size="10">3</text>

  <rect x="55"  y="272" width="90" height="34" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="100" y="294" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">[empty]</text>
  <rect x="155" y="272" width="90" height="34" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="200" y="294" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">[empty]</text>
  <rect x="255" y="272" width="90" height="34" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="300" y="288" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Eve</text>
  <text x="300" y="300" text-anchor="middle" fill="#fcc" font-size="9">99</text>
  <rect x="355" y="272" width="90" height="34" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="400" y="288" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Eve</text>
  <text x="400" y="300" text-anchor="middle" fill="#fcc" font-size="9">88</text>

  <text x="480" y="286" fill="#c62828" font-size="13" font-weight="bold">DUPLICATE! Eve at slot 2 AND slot 3</text>
  <text x="480" y="304" fill="#c62828" font-size="11">search finds the wrong value; remove leaves a ghost</text>
  <text x="480" y="320" fill="#c62828" font-size="11">size_ is wrong (incremented for a "new" entry)</text>

  <!-- ===== CORRECT PATH ===== -->
  <rect x="20" y="354" width="880" height="190" rx="8" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
  <text x="460" y="376" text-anchor="middle" fill="#1b5e20" font-size="14" font-weight="bold">FIX: Remember tombstone, keep probing for duplicate</text>

  <text x="40" y="400" fill="#1b5e20" font-size="12">hash("Eve") = 2 &#x2192; slot 2 is DELETED &#x2192; save as candidate &#x2192; keep probing!</text>
  <text x="40" y="418" fill="#1b5e20" font-size="12">slot 3 is OCCUPIED, key == "Eve" &#x2192; update value to 99 &#x2192; done (no duplicate)</text>

  <text x="80" y="446" fill="#aaa" font-size="10">0</text>
  <text x="160" y="446" fill="#aaa" font-size="10">1</text>
  <text x="240" y="446" fill="#27ae60" font-size="10">2</text>
  <text x="320" y="446" fill="#27ae60" font-size="10" font-weight="bold">3</text>

  <rect x="55"  y="452" width="90" height="34" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="100" y="474" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">[empty]</text>
  <rect x="155" y="452" width="90" height="34" rx="4" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="200" y="474" text-anchor="middle" fill="#bbb" font-size="11" font-style="italic">[empty]</text>
  <rect x="255" y="452" width="90" height="34" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="1.5"/>
  <text x="300" y="474" text-anchor="middle" fill="#fff" font-size="11">[deleted]</text>
  <rect x="355" y="452" width="90" height="34" rx="4" fill="#2ecc71" stroke="#27ae60" stroke-width="2.5"/>
  <text x="400" y="468" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">Eve</text>
  <text x="400" y="480" text-anchor="middle" fill="#d5f5e3" font-size="9">99</text>

  <text x="480" y="466" fill="#1b5e20" font-size="13" font-weight="bold">Correct: updated in place, no duplicate</text>
  <text x="480" y="484" fill="#1b5e20" font-size="11">If Eve was NOT found, THEN use the saved tombstone slot</text>

  <!-- Bottom note -->
  <rect x="20" y="504" width="880" height="46" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="460" y="522" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Rule: never stop at a tombstone during insert without first confirming the key doesn't exist further along</text>
  <text x="460" y="540" text-anchor="middle" fill="#555" font-size="11">The fix: save the first tombstone index, keep probing. If you find the key, update it. If you hit EMPTY, use the saved tombstone.</text>
</svg>
