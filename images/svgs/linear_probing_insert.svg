<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 358" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="100%" height="100%" fill="white"/>
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="bold">Linear Probing — Insert "Diana"</text>
  <text x="450" y="54" text-anchor="middle" fill="#555" font-size="13">hash("Diana") = 4, but slot 4 is occupied — scan forward until EMPTY</text>

  <!-- ===== BEFORE array (slots y=94, h=38, bottom=132) ===== -->
  <text x="30" y="74" text-anchor="start" fill="#888" font-size="12" font-weight="bold" font-style="italic">Before insert:</text>

  <text x="90"  y="88" text-anchor="middle" fill="#aaa" font-size="11">0</text>
  <text x="210" y="88" text-anchor="middle" fill="#aaa" font-size="11">1</text>
  <text x="330" y="88" text-anchor="middle" fill="#aaa" font-size="11">2</text>
  <text x="450" y="88" text-anchor="middle" fill="#aaa" font-size="11">3</text>
  <text x="570" y="88" text-anchor="middle" fill="#aaa" font-size="11">4</text>
  <text x="690" y="88" text-anchor="middle" fill="#aaa" font-size="11">5</text>
  <text x="810" y="88" text-anchor="middle" fill="#aaa" font-size="11">6</text>

  <rect x="30"  y="94" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="90"  y="118" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <rect x="150" y="94" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="110" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Bob</text>
  <text x="210" y="124" text-anchor="middle" fill="#d5f5e3" font-size="11">82</text>

  <rect x="270" y="94" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="330" y="118" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <rect x="390" y="94" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="110" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Charlie</text>
  <text x="450" y="124" text-anchor="middle" fill="#d5f5e3" font-size="11">91</text>

  <!-- Slot 4: Alice — collision, red border -->
  <rect x="510" y="94" width="120" height="38" rx="5" fill="#2ecc71" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="570" y="110" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Alice</text>
  <text x="570" y="124" text-anchor="middle" fill="#d5f5e3" font-size="11">95</text>

  <!-- Slot 5: Eve — also occupied, red border -->
  <rect x="630" y="94" width="120" height="38" rx="5" fill="#2ecc71" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="690" y="110" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Eve</text>
  <text x="690" y="124" text-anchor="middle" fill="#d5f5e3" font-size="11">88</text>

  <!-- Slot 6: empty — target -->
  <rect x="750" y="94" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="810" y="118" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <!-- ===== Probe annotations (slot bottom=132, text baseline ≥ 147) ===== -->
  <text x="570" y="150" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">OCCUPIED</text>
  <text x="570" y="163" text-anchor="middle" fill="#e74c3c" font-size="10">Alice ≠ Diana</text>

  <line x1="617" y1="155" x2="644" y2="155" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="630" y="170" text-anchor="middle" fill="#f39c12" font-size="10">probe +1</text>

  <text x="690" y="150" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">OCCUPIED</text>
  <text x="690" y="163" text-anchor="middle" fill="#e74c3c" font-size="10">Eve ≠ Diana</text>

  <line x1="737" y1="155" x2="764" y2="155" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="750" y="170" text-anchor="middle" fill="#f39c12" font-size="10">probe +1</text>

  <text x="810" y="150" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">EMPTY ✓</text>
  <text x="810" y="163" text-anchor="middle" fill="#27ae60" font-size="10">insert here</text>

  <!-- ===== AFTER array (slots y=204, h=38, bottom=242) ===== -->
  <text x="30" y="194" text-anchor="start" fill="#888" font-size="12" font-weight="bold" font-style="italic">After insert:</text>

  <text x="90"  y="200" text-anchor="middle" fill="#aaa" font-size="11">0</text>
  <text x="210" y="200" text-anchor="middle" fill="#aaa" font-size="11">1</text>
  <text x="330" y="200" text-anchor="middle" fill="#aaa" font-size="11">2</text>
  <text x="450" y="200" text-anchor="middle" fill="#aaa" font-size="11">3</text>
  <text x="570" y="200" text-anchor="middle" fill="#aaa" font-size="11">4</text>
  <text x="690" y="200" text-anchor="middle" fill="#aaa" font-size="11">5</text>
  <text x="810" y="200" text-anchor="middle" fill="#aaa" font-size="11">6</text>

  <rect x="30"  y="206" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="90"  y="230" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <rect x="150" y="206" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="222" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Bob</text>
  <text x="210" y="236" text-anchor="middle" fill="#d5f5e3" font-size="11">82</text>

  <rect x="270" y="206" width="120" height="38" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="330" y="230" text-anchor="middle" fill="#bbb" font-size="13" font-style="italic">[empty]</text>

  <rect x="390" y="206" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="222" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Charlie</text>
  <text x="450" y="236" text-anchor="middle" fill="#d5f5e3" font-size="11">91</text>

  <rect x="510" y="206" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="570" y="222" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Alice</text>
  <text x="570" y="236" text-anchor="middle" fill="#d5f5e3" font-size="11">95</text>

  <rect x="630" y="206" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <text x="690" y="222" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Eve</text>
  <text x="690" y="236" text-anchor="middle" fill="#d5f5e3" font-size="11">88</text>

  <!-- Slot 6: Diana — NEW -->
  <rect x="750" y="206" width="120" height="38" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="3"/>
  <text x="810" y="222" text-anchor="middle" fill="#fff" font-size="13" font-family="'Consolas',monospace">Diana</text>
  <text x="810" y="236" text-anchor="middle" fill="#d5f5e3" font-size="11">78</text>
  <rect x="754" y="210" width="34" height="14" rx="3" fill="#27ae60"/>
  <text x="771" y="221" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">NEW</text>

  <!-- ===== Formula box ===== -->
  <rect x="30" y="260" width="840" height="84" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="284" text-anchor="middle" fill="#f39c12" font-size="15" font-weight="bold">Linear Probing: next_slot = (index + 1) % capacity</text>
  <text x="450" y="304" text-anchor="middle" fill="#555" font-size="13">Scan forward one slot at a time — insert at the first EMPTY or DELETED slot</text>
  <text x="450" y="322" text-anchor="middle" fill="#555" font-size="12">EMPTY: insert immediately   |   DELETED (tombstone): also a valid insertion slot</text>
  <text x="450" y="338" text-anchor="middle" fill="#555" font-size="12">OCCUPIED (different key): probe +1 and continue</text>
</svg>
